<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Site Level">
<meta name="theme-color" content="#1E3A5F">
<title>Site Level</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(0,0,0,0);}
:root{
  --navy:#1E3A5F;--bg:#F8FAFC;--bg2:#fff;--bg3:#F1F5F9;
  --border:#E2E8F0;--txt:#1E293B;--muted:#64748B;--muted2:#94A3B8;
  --red:#DC2626;--yellow:#CA8A04;--green:#16A34A;
  --red-bg:#FEF2F2;--yellow-bg:#FFFBEB;--green-bg:#F0FDF4;
  --active:#FCD34D;
  --wc-va:#16A34A;--wc-motion:#EA580C;--wc-waiting:#2563EB;
  --wc-overproc:#CA8A04;--wc-defects:#DC2626;
  --head:"Barlow Condensed",sans-serif;
  --mono:"IBM Plex Mono",monospace;
  --body:"Barlow",sans-serif;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--body);}
body{overscroll-behavior:none;}

/* Screens */
.scr{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden;background:var(--bg);}
.scr.on{display:flex;}

/* Nav */
.nav{background:var(--navy);border-top:2px solid var(--red);display:flex;padding:2px 0;padding-bottom:var(--sb);flex-shrink:0;}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 4px;background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;-webkit-appearance:none;touch-action:manipulation;}
.nb.on{color:var(--active);}
.nb svg{width:20px;height:20px;fill:currentColor;display:block;}
.nb-l{font-family:var(--head);font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}

/* Scroll */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.pad{padding-bottom:calc(60px + var(--sb));}

/* Header */
.hdr{background:var(--navy);padding:10px 14px;padding-top:calc(10px + var(--st));display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.ht{font-family:var(--head);font-size:18px;font-weight:800;color:#fff;letter-spacing:.3px;}
.hs{font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.35);margin-top:1px;}
.hbtn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);padding:5px 10px;border-radius:4px;font-family:var(--head);font-size:13px;font-weight:700;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;}

/* Section label */
.sh{padding:6px 14px;background:var(--bg3);border-bottom:1px solid var(--border);border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.shl{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;}
.shr{font-family:var(--mono);font-size:9px;color:var(--muted2);}

/* KPI strip */
.ks{display:grid;background:var(--bg2);border-bottom:1px solid var(--border);}
.kpi{padding:8px 10px;border-right:1px solid var(--border);}
.kpi:last-child{border-right:none;}
.kl{font-family:var(--mono);font-size:7px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.kv{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--txt);line-height:1;}
.kv.g{color:var(--green);}.kv.y{color:var(--yellow);}.kv.r{color:var(--red);}.kv.n{color:#CBD5E1;}
.kt{font-size:9px;color:var(--muted2);margin-top:2px;}.kt.up{color:var(--green);}.kt.dn{color:var(--red);}

/* Buttons */
.btn-navy{background:var(--navy);color:#fff;border:none;border-radius:4px;font-family:var(--head);font-size:17px;font-weight:800;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;padding:13px;width:100%;}
.btn-amber{background:var(--yellow);color:#fff;border:none;border-radius:6px;font-family:var(--head);font-size:17px;font-weight:800;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;}
</style>
</head>
<body>

<!-- ═══ DASHBOARD ═══ -->
<div id="SLD" class="scr on">
  <div class="hdr">
    <div>
      <div class="ht" id="sl-plant">My Plant</div>
      <div class="hs" id="sl-shift">Loading...</div>
    </div>
    <div style="display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.4);letter-spacing:1px;">
      <div style="width:6px;height:6px;border-radius:50%;background:#22C55E;"></div>LIVE
    </div>
  </div>
  <div class="scroll">
    <div class="pad">
      <div class="ks" style="grid-template-columns:repeat(4,1fr);" id="dash-kpis"></div>
      <div class="sh"><div class="shl">Production Lines</div><div class="shr">Tap to drill in</div></div>
      <div id="dash-lines"></div>
    </div>
  </div>
  <nav class="nav" id="nav-dash">
    <button class="nb on" id="nb-dash"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span class="nb-l">Home</span></button>
    <button class="nb" id="nb-walk"><svg viewBox="0 0 24 24"><path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/></svg><span class="nb-l">Walk</span></button>
    <button class="nb" id="nb-study"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 2.5c1.38 0 2.5 1.12 2.5 2.5S13.38 11.5 12 11.5 9.5 10.38 9.5 9s1.12-2.5 2.5-2.5zM20 18H4v-.57c0-.81.48-1.53 1.22-1.85C6.42 15.07 8.89 14.5 12 14.5s5.58.57 6.78 1.08c.74.32 1.22 1.04 1.22 1.85V18z"/></svg><span class="nb-l">Study</span></button>
    <button class="nb" id="nb-bal"><svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg><span class="nb-l">Balance</span></button>
  </nav>
</div>

<!-- ═══ LINE VIEW ═══ -->
<div id="SLL" class="scr">
  <div class="hdr" style="gap:8px;">
    <button class="hbtn" id="btn-back-dash">&#8592; Home</button>
    <div style="flex:1;padding:0 8px;"><div class="ht" id="sll-name">—</div></div>
  </div>
  <div class="scroll">
    <div class="pad">
      <div class="sh"><div class="shl">Line Balance</div><div class="shr">Tap station &#8594;</div></div>
      <div id="sll-body"></div>
    </div>
  </div>
  <nav class="nav">
    <button class="nb" id="nb-dash-2">&#8592;<span class="nb-l" style="font-size:8px;">Home</span></button>
    <button class="nb"><svg viewBox="0 0 24 24"><path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/></svg><span class="nb-l">Walk</span></button>
    <button class="nb on"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 2.5c1.38 0 2.5 1.12 2.5 2.5S13.38 11.5 12 11.5 9.5 10.38 9.5 9s1.12-2.5 2.5-2.5zM20 18H4v-.57c0-.81.48-1.53 1.22-1.85C6.42 15.07 8.89 14.5 12 14.5s5.58.57 6.78 1.08c.74.32 1.22 1.04 1.22 1.85V18z"/></svg><span class="nb-l">Study</span></button>
    <button class="nb"><svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg><span class="nb-l">Balance</span></button>
  </nav>
</div>

<!-- ═══ STATION VIEW ═══ -->
<div id="SLS" class="scr">
  <div class="hdr" style="gap:8px;">
    <button class="hbtn" id="btn-back-line">&#8592; Line</button>
    <div style="flex:1;padding:0 6px;"><div class="ht" id="sls-name">—</div><div class="hs" id="sls-path">—</div></div>
    <button id="btn-new-study" style="background:none;border:1px solid rgba(252,211,77,.4);color:#FCD34D;padding:5px 10px;border-radius:3px;font-family:var(--head);font-size:13px;font-weight:800;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;white-space:nowrap;">+ New Study</button>
  </div>
  <div class="scroll">
    <div class="pad">
      <div id="sls-id" style="background:var(--bg2);border-bottom:2px solid var(--border);padding:12px 14px;"></div>
      <div style="background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 14px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <div class="shl">Work Content</div>
          <div id="sls-src" style="font-family:var(--mono);font-size:8px;padding:2px 8px;border-radius:2px;"></div>
        </div>
        <div id="sls-yam"></div>
      </div>
      <div class="sh"><div class="shl">Study History</div><div class="shr" id="sls-hist-ct">—</div></div>
      <div id="sls-studies"></div>
      <div style="padding:12px 14px;background:var(--bg2);border-top:1px solid var(--border);">
        <button class="btn-navy" id="btn-perform-study">&#65291; Perform New Study &#8594;</button>
      </div>
      <div class="sh"><div class="shl">Open Actions</div><div class="shr" id="sls-act-ct">—</div></div>
      <div id="sls-actions"></div>
    </div>
  </div>
  <nav class="nav">
    <button class="nb" id="btn-back-line-2">&#8592;<span class="nb-l" style="font-size:8px;">Line</span></button>
    <button class="nb"><svg viewBox="0 0 24 24"><path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/></svg><span class="nb-l">Walk</span></button>
    <button class="nb on"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-02-2-2zm-8 2.5c1.38 0 2.5 1.12 2.5 2.5S13.38 11.5 12 11.5 9.5 10.38 9.5 9s1.12-2.5 2.5-2.5zM20 18H4v-.57c0-.81.48-1.53 1.22-1.85C6.42 15.07 8.89 14.5 12 14.5s5.58.57 6.78 1.08c.74.32 1.22 1.04 1.22 1.85V18z"/></svg><span class="nb-l">Study</span></button>
    <button class="nb"><svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg><span class="nb-l">Balance</span></button>
  </nav>
</div>

<!-- ═══ WALK ═══ -->
<div id="SLW" class="scr">
  <div class="hdr"><div class="ht">Walk My Floor</div><div class="hs">WorkSample</div></div>
  <!-- Setup -->
  <div id="slw-setup" class="scroll" style="padding:12px;display:flex;flex-direction:column;gap:10px;padding-bottom:70px;">
    <div style="background:var(--bg2);border-radius:8px;overflow:hidden;">
      <div style="padding:8px 12px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:9px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.8px;">Which line?</div>
      <div style="padding:10px 12px;">
        <select id="slw-line-sel" style="width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:6px;font-size:15px;background:var(--bg);color:var(--txt);font-family:var(--body);">
          <option value="">Select a line...</option>
        </select>
      </div>
    </div>
    <button class="btn-navy" id="btn-start-walk" style="font-size:19px;">&#9654; Start Walking &#8594;</button>
  </div>
  <!-- Observation -->
  <div id="slw-obs" style="display:none;flex-direction:column;position:absolute;inset:0;background:var(--bg);z-index:10;">
    <div style="background:var(--navy);padding:10px 14px;padding-top:calc(10px + var(--st));border-bottom:2px solid var(--red);flex-shrink:0;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
        <div style="font-family:var(--head);font-size:15px;font-weight:800;color:#fff;" id="slw-line-lbl">—</div>
        <div style="font-family:var(--mono);font-size:22px;font-weight:700;color:var(--active);" id="slw-pct">—%</div>
      </div>
      <div style="height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;">
        <div id="slw-prog" style="height:100%;background:var(--active);width:0%;transition:width .3s;border-radius:3px;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:3px;">
        <span style="font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.4);" id="slw-cnt">0 obs</span>
        <span style="font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.4);">Target: 97</span>
      </div>
    </div>
    <div id="slw-btns" style="flex:1;padding:10px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;padding-bottom:70px;"></div>
    <div style="padding:8px 12px;display:flex;gap:8px;flex-shrink:0;background:var(--bg);border-top:1px solid var(--border);">
      <button id="btn-undo" style="flex:1;padding:11px;background:var(--bg3);color:var(--muted);border:1px solid var(--border);border-radius:6px;font-family:var(--head);font-size:14px;font-weight:700;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;">&#8617; Undo</button>
      <button id="btn-finish" disabled style="flex:2;padding:11px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-family:var(--head);font-size:14px;font-weight:800;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;opacity:.3;">Finish &#8594;</button>
    </div>
  </div>
  <!-- Result -->
  <div id="slw-result" style="display:none;flex-direction:column;position:absolute;inset:0;background:var(--bg);z-index:10;overflow-y:auto;">
    <div style="background:var(--navy);padding:10px 14px;padding-top:calc(10px + var(--st));display:flex;align-items:center;gap:10px;flex-shrink:0;">
      <button id="btn-new-walk" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 10px;border-radius:4px;font-family:var(--head);font-size:12px;font-weight:700;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;">&#8592; New</button>
      <div style="font-family:var(--head);font-size:15px;font-weight:800;color:#fff;">Results</div>
    </div>
    <div style="padding:14px;display:flex;flex-direction:column;gap:12px;padding-bottom:80px;">
      <div style="background:var(--bg2);border-radius:10px;padding:18px;text-align:center;border-top:4px solid var(--navy);">
        <div style="font-family:var(--mono);font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;" id="slwr-line">—</div>
        <div style="font-family:var(--mono);font-size:60px;font-weight:600;color:var(--navy);line-height:1;" id="slwr-va">—</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px;">Value Add</div>
      </div>
      <div style="background:var(--bg2);border-radius:10px;padding:14px;" id="slwr-bars"></div>
      <div style="background:var(--navy);border-radius:10px;padding:16px;border-left:4px solid var(--yellow);">
        <div style="font-size:14px;color:rgba(255,255,255,.8);line-height:1.7;margin-bottom:14px;" id="slwr-copy"></div>
        <button id="btn-find-cause" class="btn-amber" style="width:100%;padding:13px;font-size:17px;">Find out what's causing it &#8594;</button>
      </div>
    </div>
  </div>
  <nav class="nav">
    <button class="nb" id="nb-home-from-walk">&#8592;<span class="nb-l" style="font-size:8px;">Home</span></button>
    <button class="nb on"><svg viewBox="0 0 24 24"><path d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/></svg><span class="nb-l">Walk</span></button>
    <button class="nb" id="nb-study-from-walk"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm-8 2.5c1.38 0 2.5 1.12 2.5 2.5S13.38 11.5 12 11.5 9.5 10.38 9.5 9s1.12-2.5 2.5-2.5zM20 18H4v-.57c0-.81.48-1.53 1.22-1.85C6.42 15.07 8.89 14.5 12 14.5s5.58.57 6.78 1.08c.74.32 1.22 1.04 1.22 1.85V18z"/></svg><span class="nb-l">Study</span></button>
    <button class="nb"><svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg><span class="nb-l">Balance</span></button>
  </nav>
</div>

// ── Show/hide ─────────────────────────────────────────────────────────────────
function show(id){
  document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on');});
  var el=document.getElementById(id);
  if(el)el.classList.add('on');
}
function $id(id){return document.getElementById(id);}
function setHTML(id,html){var e=$id(id);if(e)e.innerHTML=html;}
function setText(id,txt){var e=$id(id);if(e)e.textContent=txt;}

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',function(){
  var now=new Date();
  var days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var d=days[now.getDay()]+' '+(now.getMonth()+1)+'/'+now.getDate();
  var h=now.getHours(),shift=h<14?'1st Shift':h<22?'2nd Shift':'3rd Shift';
  setText('sl-shift',d+' · '+shift);
  var pname=localStorage.getItem('sl_plant')||'My Plant';
  setText('sl-plant',pname);
  buildDashKPIs();
  buildDashLines();
  buildWalkSetup();
  bindEvents();
});

// ── Dashboard ─────────────────────────────────────────────────────────────────
function buildDashKPIs(){
  var tv=0,vc=0,ta=0,wc={};
  LINES.forEach(function(L){if(L.va>0){tv+=L.va;vc++;}ta+=L.actions;if(L.waste)wc[L.waste]=(wc[L.waste]||0)+1;});
  var avg=vc?Math.round(tv/vc):0;
  var top=Object.keys(wc).sort(function(a,b){return wc[b]-wc[a];})[0]||'—';
  var ts=LINES.reduce(function(a,L){return a+L.studies;},0);
  setHTML('dash-kpis',
    '<div class="kpi"><div class="kl">Plant VA</div><div class="kv g">'+avg+'%</div><div class="kt up">▲ trending</div></div>'
    +'<div class="kpi"><div class="kl">Studies</div><div class="kv">'+ts+'</div><div class="kt">all lines</div></div>'
    +'<div class="kpi"><div class="kl">Actions</div><div class="kv r">'+ta+'</div><div class="kt dn">overdue</div></div>'
    +'<div class="kpi"><div class="kl">Top Waste</div><div class="kv y" style="font-size:13px;padding-top:3px;">'+top+'</div><div class="kt">avg</div></div>'
  );
}

        var sa=S.trend==='up'?'↑':S.trend==='dn'?'↓':'—';
        var sa_c=S.trend==='up'?'#16A34A':S.trend==='dn'?'#DC2626':'#CBD5E1';
        html+='<div data-lid="'+L.id+'" data-sid="'+S.id+'" class="station-row" style="display:flex;align-items:center;padding:6px 12px 6px 20px;border-bottom:1px solid #F1F5F9;gap:7px;cursor:pointer;">'
          +'<div style="width:6px;height:6px;border-radius:50%;background:'+ss+';flex-shrink:0;"></div>'
          +'<div style="font-size:12px;color:var(--muted);flex:1;">'+S.name+'</div>'
          +'<div style="font-family:var(--mono);font-size:11px;font-weight:600;color:'+sv+';">'+S.va+'%</div>'
          +'<div style="font-size:11px;color:'+sa_c+';">'+sa+'</div>'
          +'<div style="font-family:var(--mono);font-size:9px;color:var(--muted2);">'+S.gap+'</div>'
          +'</div>';
      });
      html+='</div>';
    }
  });
  setHTML('dash-lines',html);
}

// ── Line View ─────────────────────────────────────────────────────────────────
function openLine(lid){
  _curLine=LINES.find(function(L){return L.id===lid;});
  if(!_curLine)return;
  setText('sll-name',_curLine.name);
  setHTML('sll-body',LINE_VIEWS[lid]||'<div style="padding:24px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted2);">No studies yet — walk this line first</div>');
  show('SLL');
  // Bind station bar clicks after render
  setTimeout(function(){
    var bars=document.querySelectorAll('.yam-bar');
    bars.forEach(function(b){
      b.addEventListener('click',function(){
        openStation(this.dataset.lid,this.dataset.sid);
      });
    });
  },50);
}

// ── Station View ──────────────────────────────────────────────────────────────
function openStation(lid,sid){
  var line=LINES.find(function(L){return L.id===lid;});
  if(!line)return;
  var st=line.stations.find(function(S){return S.id===sid;});
  if(!st)return;
  _curLine=line;_curStation=st;
  var key=lid+'_'+sid;
  var sv=STATION_VIEWS[key];
  if(!sv)return;
  setText('sls-name',st.name);
  setText('sls-path',line.name+' · '+st.name);
  setHTML('sls-id',sv.id_card);
  setHTML('sls-yam',sv.yam);
  // Source badge
  var badge=$id('sls-src');
  if(badge){
    if(sv.src==='observed'){
      badge.textContent='Observed · '+sv.date;
      badge.style.cssText='background:rgba(22,163,74,.1);color:#16A34A;border:1px solid rgba(22,163,74,.2);';
    }else{
      badge.textContent='Engineered Std';
      badge.style.cssText='background:rgba(202,138,4,.1);color:#CA8A04;border:1px solid rgba(202,138,4,.2);';
    }
  }
  // Study history
  var studies=[
    {date:sv.date+', 2026',analyst:'Eric Martin',gates:'All 7 gates',va:st.va,src:sv.src,active:true},
    {date:'Mar 2, 2026',analyst:'Travis K',gates:'Gates 1–5',va:st.va+4,src:'observed',active:false},
    {date:'Jan 2025',analyst:'Eng. Std Rev 4',gates:'9 steps',va:null,ct:st.takt,src:'engineered',active:false},
  ];
  setText('sls-hist-ct',studies.length+' studies');
  setHTML('sls-studies',studies.map(function(s){
    var bc=s.active?'background:#EFF6FF;border-left:4px solid #3B82F6;':'border-left:4px solid transparent;';
    var vc=s.src==='observed'?'#16A34A':'#CA8A04';
    var bs=s.src==='observed'?'background:rgba(22,163,74,.1);color:#16A34A;border:1px solid rgba(22,163,74,.2);':'background:rgba(202,138,4,.1);color:#CA8A04;border:1px solid rgba(202,138,4,.2);';
    var bt=s.src==='observed'?'OBSERVED':'ENGINEERED';
    return'<div style="border-bottom:1px solid var(--border);background:var(--bg2);padding:9px 14px;display:flex;align-items:center;gap:10px;'+bc+'">'
      +'<div style="flex:1;"><div style="font-family:var(--head);font-size:14px;font-weight:700;color:var(--txt);">'+s.date+'</div>'
      +'<div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:1px;">'+s.analyst+' · '+s.gates+'</div></div>'
      +'<div style="text-align:right;"><div style="font-family:var(--mono);font-size:18px;font-weight:600;color:'+vc+';">'+(s.va?s.va+'%':s.ct+'s')+'</div>'
      +'<div style="font-family:var(--mono);font-size:7px;padding:2px 5px;border-radius:2px;display:inline-block;margin-top:2px;'+bs+'">'+bt+'</div></div>'
      +'</div>';
  }).join(''));
  // Actions
  setText('sls-act-ct',st.actions>0?st.actions+' open · 1 overdue':'0 open');
  if(st.actions>0){
    setHTML('sls-actions','<div style="border-bottom:1px solid var(--border);background:var(--red-bg);padding:10px 14px;display:flex;align-items:flex-start;gap:10px;">'
      +'<div style="flex:1;"><div style="font-size:13px;color:var(--txt);line-height:1.4;">Document standard method — 3 methods observed, no standard confirmed</div>'
      +'<div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:3px;">Gate 7 · '+sv.date+' study</div></div>'
      +'<div style="text-align:right;flex-shrink:0;"><div style="font-family:var(--mono);font-size:10px;font-weight:700;color:var(--red);">OVERDUE</div>'
      +'<div style="font-family:var(--mono);font-size:9px;color:var(--muted2);margin-top:2px;">Apr 21</div></div></div>');
  }else{
    setHTML('sls-actions','<div style="padding:14px;font-family:var(--mono);font-size:11px;color:var(--muted2);text-align:center;">No open actions</div>');
  }
  show('SLS');
}

// ── Walk ──────────────────────────────────────────────────────────────────────
var _wObs=[],_wTotal=0,_wLine='';
var WALK_CATS=[
  ['va','✅ Value Add','#16A34A'],
  ['motion','🚶 Motion','#EA580C'],
  ['waiting','⌛ Waiting','#2563EB'],
  ['overproc','🔄 Over-proc','#CA8A04'],
  ['defects','⚠️ Defects','#DC2626'],
];

function buildWalkSetup(){
  var sel=$id('slw-line-sel');
  if(!sel)return;
  LINES.forEach(function(L){
    var o=document.createElement('option');
    o.value=L.id;o.textContent=L.name;sel.appendChild(o);
  });
  var btns=$id('slw-btns');
  if(btns){
    WALK_CATS.forEach(function(c){
      var btn=document.createElement('button');
      btn.style.cssText='width:100%;padding:18px 14px;background:'+c[2]+';color:#fff;border:none;border-radius:8px;font-family:var(--head);font-size:18px;font-weight:800;cursor:pointer;-webkit-appearance:none;touch-action:manipulation;text-align:left;';
      btn.textContent=c[1];
      btn.dataset.cat=c[0];
      btn.addEventListener('click',function(){wObs(this.dataset.cat);});
      btns.appendChild(btn);
    });
  }
}

function wObs(cat){
  _wObs.push(cat);_wTotal++;
  var va=_wObs.filter(function(o){return o==='va';}).length;
  var pct=Math.round(va/_wTotal*100);
  setText('slw-pct',pct+'%');
  var pb=$id('slw-prog');if(pb)pb.style.width=Math.min(100,_wTotal/97*100)+'%';
  setText('slw-cnt',_wTotal+' obs');
  if(_wTotal>=20){var fb=$id('btn-finish');if(fb){fb.disabled=false;fb.style.opacity='1';}}
}

function startWalk(){
  var sel=$id('slw-line-sel');var lid=sel?sel.value:'';
  if(!lid){alert('Select a line first.');return;}
  var L=LINES.find(function(x){return x.id===lid;});
  _wLine=L?L.name:lid;_wObs=[];_wTotal=0;
  setText('slw-line-lbl',_wLine);setText('slw-pct','—%');setText('slw-cnt','0 obs');
  var prog=$id('slw-prog');if(prog)prog.style.width='0%';
  var fb=$id('btn-finish');if(fb){fb.disabled=true;fb.style.opacity='.3';}
  $id('slw-setup').style.display='none';
  var obs=$id('slw-obs');if(obs)obs.style.display='flex';
}

function finishWalk(){
  var va=_wObs.filter(function(o){return o==='va';}).length;
  var vp=_wTotal>0?Math.round(va/_wTotal*100):0;
  var waste=100-vp;
  var cats={};_wObs.forEach(function(o){if(o!=='va')cats[o]=(cats[o]||0)+1;});
  $id('slw-obs').style.display='none';
  var res=$id('slw-result');if(res)res.style.display='flex';
  setText('slwr-line',_wLine);setText('slwr-va',vp+'%');
  var CLAB={va:'Value Add',motion:'Motion',waiting:'Waiting',overproc:'Over-proc',defects:'Defects'};
  var CCOL={va:'var(--navy)',motion:'#EA580C',waiting:'#2563EB',overproc:'#CA8A04',defects:'#DC2626'};
  var all=[['va',va]].concat(Object.entries(cats));
  setHTML('slwr-bars',all.map(function(e){
    var cls=e[0],cnt=e[1];var pct=_wTotal>0?Math.round(cnt/_wTotal*100):0;
    return'<div style="margin-bottom:9px;"><div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:3px;"><span>'+(CLAB[cls]||cls)+'</span><span>'+pct+'%</span></div>'
      +'<div style="height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;"><div style="height:100%;background:'+(CCOL[cls]||'#888')+';border-radius:3px;width:'+pct+'%;"></div></div></div>';
  }).join(''));
  var rec=Math.max(1,Math.round(waste*.1));
  setHTML('slwr-copy','You found that <strong style="color:var(--active)">'+waste+'% of operator time</strong> is spent on work your customers don\u2019t pay for. What could you do with <strong style="color:var(--active)">'+rec+'%</strong> of that back?');
}

// ── Bind all events (no inline handlers) ─────────────────────────────────────
function bindEvents(){
  // Dashboard nav
  $id('nb-dash').addEventListener('click',function(){show('SLD');});
  $id('nb-walk').addEventListener('click',function(){show('SLW');});
  $id('nb-study').addEventListener('click',function(){window.location.href=PDX_URL;});
  $id('nb-bal').addEventListener('click',function(){alert('Line Balance — coming soon');});

  // Line rows
  document.addEventListener('click',function(e){
    var lr=e.target.closest('.line-row');
    if(lr)openLine(lr.dataset.lid);
    var sr=e.target.closest('.station-row');
    if(sr)openStation(sr.dataset.lid,sr.dataset.sid);
  });

  // Line view back
  $id('btn-back-dash').addEventListener('click',function(){show('SLD');});
  $id('nb-dash-2').addEventListener('click',function(){show('SLD');});

  // Station view back
  $id('btn-back-line').addEventListener('click',function(){if(_curLine)openLine(_curLine.id);else show('SLD');});
  $id('btn-back-line-2').addEventListener('click',function(){if(_curLine)openLine(_curLine.id);else show('SLD');});
  $id('btn-new-study').addEventListener('click',function(){window.location.href=PDX_URL;});
  $id('btn-perform-study').addEventListener('click',function(){window.location.href=PDX_URL;});

  // Walk
  $id('btn-start-walk').addEventListener('click',startWalk);
  $id('btn-undo').addEventListener('click',function(){
    if(!_wObs.length)return;_wObs.pop();_wTotal=Math.max(0,_wTotal-1);
    var va=_wObs.filter(function(o){return o==='va';}).length;
    var pct=_wTotal>0?Math.round(va/_wTotal*100):0;
    setText('slw-pct',_wTotal>0?pct+'%':'—%');
    var pb=$id('slw-prog');if(pb)pb.style.width=Math.min(100,_wTotal/97*100)+'%';
    setText('slw-cnt',_wTotal+' obs');
  });
  $id('btn-finish').addEventListener('click',finishWalk);
  $id('btn-new-walk').addEventListener('click',function(){
    $id('slw-result').style.display='none';$id('slw-obs').style.display='none';$id('slw-setup').style.display='flex';
  });
  $id('btn-find-cause').addEventListener('click',function(){window.location.href=PDX_URL;});
  $id('nb-home-from-walk').addEventListener('click',function(){show('SLD');});
  $id('nb-study-from-walk').addEventListener('click',function(){window.location.href=PDX_URL;});
}
</script>
